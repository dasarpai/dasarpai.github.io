# Scrum Orientation  
### Understanding Agile Roles, Processes, and Artifacts


                  </script></section><section data-markdown><script type=text/template>
                      

## Role: Product Owner

- Represents business and customer
- Owns and manages the **Product Backlog**
- Prioritizes based on **business value/risk/cost** factors
- Ensures team understands the backlog
- Accepts/rejects work results
- Available to the team for clarification


                  </script></section><section data-markdown><script type=text/template>
                      

## Role: Scrum Master

- Facilitator and coach for the team
- Removes impediments
- Ensures adherence to Scrum practices
- Shields team from external interference
- Helps improve team dynamics and performance
- Master of ceremonies : Release Planning, Sprint Planning, Daily Standup, Sprint Review, Retrospective 


                  </script></section><section data-markdown><script type=text/template>
                      

## Role: Development Team

- Cross-functional and self-organizing with general skills
- Delivers potentially shippable increments each sprint
- Estimates and plans their work (Sprint planning with Scrum Master and PO )
- Collaborates daily and continuously
- Accountable for quality and delivery
- Establish their velocity
- Demo to product Owner
- Daily standup along with Scrum Master and PO 


                  </script></section><section data-markdown><script type=text/template>
                      

## Work Item Hierarchy

- **Epic**: Large initiative (e.g., *Online Payment System*). Typically 1-3 month duration of the entire team.
- **Feature**: Major capability within epic (e.g., *Add Credit Card*). Typically 1 month or less of the entire team.
- **User Story**: Smallest unit of functionality (e.g., *As a user, I can add a card*). Typically 1 week or less of the entire team.
- **Task**: Steps to complete a story (e.g., *UI form*, *Backend API*). Typically 1 day for each team member. No less than 2 hours no more than 12 hours.


                  </script></section><section data-markdown><script type=text/template>
                      

## Example: Epic to Task

- **Epic**: Enhance Checkout Experience
  - **Feature**: Credit Card Payment
    - **User Story**: As a user, I can save a card for future payments.
      - **Tasks**:
        - Design UI (2 hrs)
        - Implement backend API (5 hrs)
        - Write unit tests (3 hrs)


                  </script></section><section data-markdown><script type=text/template>
                      

## What is a Story Card?

- A user story is written on a story card
- Format: As a <user>, I want <goal>, so that <benefit>
- Back side of the story card Includes:
  - Description
  - Acceptance criteria
  - Effort estimate (story points)
  - Priority
- **INVEST** principle: A user story should be Independent, Negotiable, Valuable, Estimable, Small, Testable


                  </script></section><section data-markdown><script type=text/template>
                      
## Product Backlog Grooming

- **When**: Mid-sprint (recurring)
- **Time Needed**: ~1–2 hours/week of work
- **Who**:
  - Product Owner (leads)
  - Dev Team
  - Scrum Master (facilitates)
- **What Happens**:
  - Add/Refine/Remove stories
  - Break large stories
  - Clarify requirements
  - Estimate complexity and effort (if possible)


                  </script></section><section data-markdown><script type=text/template>
                      

## Sprint Planning

- **When**: At the start of each sprint
- **Time Needed**:
  - Up to 2-3 hours for a 2-week sprint
- **Who**:
  - Dev Team
  - Product Owner
  - Scrum Master
- **Goal**:
  - **Define Sprint Goal**
  - Pull stories from Product Backlog
  - Break into tasks
  - Team commits to the sprint backlog

<div class="caution-box">
Caution: No person in the organization should assign the work to team. Team must plan and self assign the work keeping the sprint goal in mind.
</div>


                  </script></section><section data-markdown><script type=text/template>
                      

## Release Planning

- **Longer-term planning**
- **Prerequisite:** Product roadmap
- Focus on **features per release**
- Considers:
  - Velocity trends
  - Business priorities
  - Market deadlines
- Involves:
  - PO (leads)
  - Stakeholders
  - Dev Team (for estimates)


                  </script></section><section data-markdown><script type=text/template>
                      

## Product Demo (Sprint Review)

- **When**: End of sprint
- **Duration**: 1 hour/sprint week of work
- **Goal**:
  - Showcase increment to stakeholders
  - Gather feedback
- **Who**:
  - Scrum Team Lead by PO 
  - Stakeholders (business user)
- **Not** just a demo — it’s a **collaborative review**

<div class="caution-box">
Caution: Product owner in already involved through the sprint so they know what is build. This ceremony is to show the product to Business.
</div>


                  </script></section><section data-markdown><script type=text/template>
                      

## Retrospective

- **When**: After Sprint Review
- **Duration**: 1–1.5 hours
- **Participants**: Scrum Team
- **Goal**:
  - Reflect on past sprint
  - Identify improvements
  - Decide on 1–2 action items
- **Safe space**: Encourage honesty and learning

<div class="caution-box">
Caution: Management people should not attend these meetings unless requested by Dev Team and Dev Team is not comfortable.
</div>


                  </script></section><section data-markdown><script type=text/template>
                      

## Summary

- Scrum is about **transparency**, **inspection**, and **adaptation**
- Team size: 7+/-2, including PO and SM.
- Scrum duration: 1-4 weeks. Depends upon requirement stability, team size, and complexity of the project.
- Velocity: Story points delivered / sprint (story points are complexity assessment by team and NOT efforts estimation.)
- Roles are **clear and accountable**
- Ceremonies create **cadence and feedback loops**
- Artifacts ensure **clarity and progress**
- Teams grow through **collaboration and reflection**


                  </script></section><section data-markdown><script type=text/template>
