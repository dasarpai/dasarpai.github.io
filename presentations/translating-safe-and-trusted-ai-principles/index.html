# The Truth 

“Most AI failures don’t happen because people had bad intentions.  
They happen because good principles were never translated into systems.”

We know
- about ChatGPT hallucinations.
- Biased can be models.
- AI systems fails silently.

**AI does exactly what we design — not what we intend.**


                  </script></section><section data-markdown><script type=text/template>
                      

# Safe & Trusted AI 

What Do These Words Really Mean?

**Safe AI** → Does not cause harm even when it fails

**Trusted AI** → Predictable, explainable, auditable

**Responsible AI** → Clear ownership and accountability

Think about AI in solving math problem, recommending some therapy, recommending some product, showing direction on the road, etc.

**Ethics is not a document. Ethics is a design decision.**


                  </script></section><section data-markdown><script type=text/template>
                      

# Common Principles

* Fairness
* Transparency
* Privacy
* Reliability
* Human oversight

**But principles alone don’t stop failures**


                  </script></section><section data-markdown><script type=text/template>
                      

# Where AI Breaks in the Real World

## 1. Hallucination

LLM gives confident but false answers

- A lawyer used an AI assistant to draft a legal brief.
- Invented research papers or authors with realistic titles
- Wrong medical facts confidently stated without evidence

Not a bug — a design characteristic

Lesson:  
You Trust AI ≠ It does not mean answer is accurate   
AI responding confidently ≠ It doesn't mean, response is correct


                  </script></section><section data-markdown><script type=text/template>
                      

## 2. Bias from data

Model reflects society’s bias

“Garbage in → sophisticated garbage out”

Lesson:   
AI doesn’t create bias — it amplifies it

Training datasets is dominated by   
- lighter-skinned male faces
- good transactions
- criminals from a particular color or religion or region 


                  </script></section><section data-markdown><script type=text/template>
                      

## 3. Automation without accountability

When an AI system makes a wrong decision, who is responsible?

Developer? Company? User? Manufacturer? Integrator?

When 
- An autonomous car makes an accident
- A researchers cites the wrong paper
- A lawyer cite wrong past judgement in the court
- A teacher explains wrongly 


                  </script></section><section data-markdown><script type=text/template>
                      
## 4. Silent failure

Model degrades over time

Nobody notices until damage is done

When
- A model start accepting loan application of wrong people
- Resume screening shifts → irrelevant skills start scoring high
- Attrition prediction weakens → high-risk employees not flagged
- Fraud model relaxes → fraudulent transactions slowly pass as “normal”


                  </script></section><section data-markdown><script type=text/template>

“Safe AI is not built at the end.  
It is designed from day one.”


                  </script></section><section data-markdown><script type=text/template>
                      

# Your Role

You are not just users of AI   
You are future designers of AI

**Remember to Ask yourself**
- What happens when this system fails?
- Who is affected if it is wrong?
- Who is accountable for the decision?

“The most dangerous AI is not the most powerful one —  
it is the one nobody is responsible for.”


                  </script></section><section data-markdown><script type=text/template>
                      

# Finally

“AI will shape society not because it is intelligent,  
but because humans trust it.”

“Your responsibility is not to build smarter AI —  
but wiser systems.”
