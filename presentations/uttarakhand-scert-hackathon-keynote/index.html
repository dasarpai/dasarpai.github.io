# Uttarakhand SCERT Hackathon Keynote

<small>Empowering Youth through AI and Digital Solutions for Environmental Resilience</small>

<small>Learning AI through Environment, Sustainability & Social Impact</small>


SCERT Uttarakhand | AI Hackathon Conclusion

**Dr. Hari Thapliyaal, PMP**

<small>DBA(AI), MS(AI), MCA, MBA (Operations), PGDFM, ZED Master Trainer, PMP, MCITP, PMI-ACP, PRINCE2 Practitioner, SCT, CSM, MCT, SDC, SCM, SPOC, SAMC </small>



                  </script></section><section data-markdown><script type=text/template>
                      

## **Today's Journey**

**One Year of Learning | One Vision for Transformation**

* From hackathon event to **institutional capacity**
* From student projects to **system solutions**
* From technology training to **sustainable change**

<small>**The Question:**  
How do we turn this momentum into lasting impact for Uttarakhand?</small>


                  </script></section><section data-markdown><script type=text/template>
                      

## **AI in Uttarakhand Must Begin with Geography**

* Fragile hill ecology
* Climate uncertainty
* Remote habitations
* Disaster-prone regions
* Limited infrastructure but rich local knowledge

<small>**Key Message:**  
Uttarakhand is not a “technology problem”  
it is a **systems and resilience problem**.</small>


                  </script></section><section data-markdown><script type=text/template>
                      

## **Beyond Coding Hackathon and Apps**

Students worked on:

* Forest fires
* Landslides
* Water scarcity
* Climate & frost
* Waste, energy, transport
* Girls’ education & inclusion

<small>**Insight:**  
These were **not student projects**  
These were **early versions of public systems**</small>


                  </script></section><section data-markdown><script type=text/template>
                      

## **Four AI Systems in those 50+ Topics**

Instead of many ideas, we see **four clusters**:

* 1️⃣ Environmental Intelligence
* 2️⃣ Resource Sustainability
* 3️⃣ School & Community as Sensors
* 4️⃣ Human Capital & Inclusion

<small>**This is system thinking — not syllabus thinking**</small>


                  </script></section><section data-markdown><script type=text/template>
                      

## **1. Environmental Intelligence**

**AI for Anticipation, Not Reaction**

* Forest fire prediction
* Landslide-prone mapping
* Glacier & deforestation tracking
* Weather & frost advisory

<small>Students learned:  
**How to predict**</small>


                  </script></section><section data-markdown><script type=text/template>
                      

## **2. Resource Sustainability**

**AI for Resilience**

* Water quality & scarcity
* Smart irrigation
* Soil health monitoring
* Micro-hydro & solar awareness

<small>Shift in mindset:  
From **consumption** → **conservation & optimization**</small>


                  </script></section><section data-markdown><script type=text/template>
                      

## **3. Schools as Living Labs**
**Every School Can Be a Data Node**

* Waste segregation & cleanliness tracking
* Air quality in hill towns
* Rainwater harvesting
* Energy usage monitoring

<small>Schools become:</small>  
* Observation centers  
* Data creators  
* Local solution hubs


                  </script></section><section data-markdown><script type=text/template>
                      

## **4. Human Capital & Inclusion**
**AI for Dignity and Opportunity**

* AI chatbots for underserved students
* Girls’ career mapping
* Accessibility via TTS/STT
* Local language digital storytelling

<small>AI here is **not automation**  
AI here is **empowerment**</small>


                  </script></section><section data-markdown><script type=text/template>
                      

## **Policy Alignment: SEP 2020 & NEP 2020**

**Why This Matters for Government**

* **NEP 2020**: Experiential learning, critical thinking, problem-solving
* **SEP 2020**: Contextual education aligned with Uttarakhand's needs
* **SDG Goals**: Climate action, quality education, gender equality
* **National AI Strategy**: AI for social good and inclusive development

<small>**The Alignment:**
This hackathon **is** SEP 2020 and NEP 2020 in action  
Students learning by solving real problems in their own context</small>


                  </script></section><section data-markdown><script type=text/template>
                      

# **From Event to Institution: The Transformation Roadmap - 1**

**What SCERT Can Do Next — Concrete Steps**

**Phase 1: Curriculum Integration (Next 3-6 months)**

1️⃣ **Convert hackathon themes into AI-in-Context Learning Modules**
   * Embed environmental problems into science/technology curriculum
   * Create project-based learning units aligned with the four clusters
   * Document student solutions as learning resources


                  </script></section><section data-markdown><script type=text/template>
                      

# **From Event to Institution: The Transformation Roadmap - 2**
**Phase 1: Curriculum Integration (Next 3-6 months)**

2️⃣ **Establish School Innovation Labs**
   * Designate one school per block as "Living Lab"
   * Provide basic IoT sensors and data collection tools
   * Create monthly problem-solving challenges linked to local issues


                  </script></section><section data-markdown><script type=text/template>
                      

# **From Event to Institution: The Transformation Roadmap - 3**

**Phase 2: Capacity Building (6-12 months)**

3️⃣ **Train Teachers as AI Mentors, Not Programmers**
   * Focus on "AI thinking" — data, patterns, predictions
   * Teach teachers to guide problem-finding, not just problem-solving
   * Create a network of master trainers across districts


                  </script></section><section data-markdown><script type=text/template>
                      

# **From Event to Institution: The Transformation Roadmap - 4**
**Phase 2: Capacity Building (6-12 months)**

4️⃣ **Build Student-Government Collaboration Channels**
   * Monthly "Youth Solutions" presentations to local administration
   * Connect student projects with relevant government departments
   * Create pathways for pilot implementation of student innovations


                  </script></section><section data-markdown><script type=text/template>
                      

# **From Event to Institution: The Transformation Roadmap - 5**

**Phase 3: Sustainability & Scale (Ongoing)**

5️⃣ **Create a Repository of Local Solutions**
   * Document all student projects in searchable format
   * Connect similar problems across different regions
   * Build a knowledge ecosystem accessible to all schools


                  </script></section><section data-markdown><script type=text/template>
                      

# **From Event to Institution: The Transformation Roadmap - 6**

**Phase 3: Sustainability & Scale (Ongoing)**

6️⃣ **Establish Annual Innovation Challenges**
   * Make this a regular calendar event, not a one-time hackathon
   * Link annual themes to emerging environmental/social challenges
   * Celebrate and showcase solutions at state-level events


                  </script></section><section data-markdown><script type=text/template>
                      

# **The Paradigm Shift**

**What We've Learned in One Year**

**Tools for Transformation are Changing.**

* The future generation **must** have access to these changing tools.
They must **think about problems as personal** — because they are.
 
* **Education, Businesses, and Government should be enablers:**
Rather than solving problems **for** them,
work **with** them to understand problems and co-create solutions.


                  </script></section><section data-markdown><script type=text/template>
                      

# **Concrete Action Items for Government Officials - 1**

**For SCERT Leadership**

* Approve integration of AI-in-Context modules into curriculum framework
* Allocate budget for School Innovation Labs (10-15 pilot schools)
* Create teacher training schedule for AI mentorship program
* Establish formal evaluation criteria for student innovation projects


                  </script></section><section data-markdown><script type=text/template>
                      

# **Concrete Action Items for Government Officials - 2**

**For District Education Officers**

* Identify "Living Lab" schools in each block
* Facilitate connections between schools and local government departments
* Create monthly "Youth Solutions Forum" at district level
* Document and report student innovations to state level


                  </script></section><section data-markdown><script type=text/template>
                      

# **Concrete Action Items for Government Officials - 3**

**For Policy Makers**

* Recognize this as official SEP 2020 implementation model
* Create funding mechanism for scaling successful innovations
* Establish cross-departmental coordination (Education, Environment, Disaster Management)
* Include student innovation metrics in education department KPIs


                  </script></section><section data-markdown><script type=text/template>
                      

# **Measuring Success: Key Indicators**

**What Success Looks Like**

* **Student Engagement**: Active participation in problem-solving projects
* **Teacher Transformation**: Teachers as facilitators of discovery, not just instructors
* **Community Impact**: Local problems identified and addressed by students
* **Policy Integration**: Student solutions informing government initiatives
* **Sustainable Learning**: Knowledge and practices continuing beyond hackathon


                  </script></section><section data-markdown><script type=text/template>
                      

# **The Metric:**  
Not how many apps were built, but how many **problems were understood**  
and how many **solutions were co-created** with local communities.


                  </script></section><section data-markdown><script type=text/template>
                      

# **Uttarakhand's National Opportunity**

If Bangalore can teach AI for **scale**,   
Uttarakhand can teach AI for **sustainability, survival & balance**.

**The Unique Positioning:**

* Not competing with metros on technology sophistication
* Leading the nation on **contextual intelligence** and **resilience thinking**
* Creating a model for **mountain states** across India and the world


                  </script></section><section data-markdown><script type=text/template>
                      

# **The Call to Action**

**Three Non-Negotiables:**

1️⃣ **Don't end this with certificates**  
   Certificates celebrate completion. We need **continuity**.

2️⃣ **Turn it into a living education ecosystem**  
   Every school becomes a node in a network of learning and problem-solving.

3️⃣ **Let Uttarakhand become India's "AI-for-Earth" classroom**  
   Where students learn AI not for exams, but for **life**.


                  </script></section><section data-markdown><script type=text/template>
                      

# **The Vision**

**Five Years from Now**

* Every student in Uttarakhand learns AI through solving local problems
* Schools are recognized as **innovation hubs** in their communities
* Student solutions inform policy and government initiatives
* Uttarakhand becomes a **model state** for contextual AI education
* Other states come to **learn from Uttarakhand's approach**


                  </script></section><section data-markdown><script type=text/template>
                      

# **The Vision**

* **This is not about technology.**  
* **This is about transforming education to serve the needs of tomorrow.**  
* **This is about empowering youth to build resilient communities.**


                  </script></section><section data-markdown><script type=text/template>
                      

# **Thank You**

**Dr. Hari Thapliyaal, PMP**

"The future belongs to those who can solve problems that matter.  
Uttarakhand's youth have shown they are ready.  
The question is: Are we ready to enable them?"

**Let's Build India's First AI-for-Earth Learning Ecosystem Together.**
