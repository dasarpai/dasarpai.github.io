# Modern Software Engineering Practices  
### Tools • Mindset • Collaboration

_A guide for building high-quality, maintainable, and scalable software_

## Agenda

1. Version Control (Git)
2. Coding Standards
3. Code Reviews
4. TDD (Test-Driven Development)
5. Static Code Analysis
6. CI/CD Pipelines
7. DevOps & Agile Mindset


                  </script></section><section data-markdown><script type=text/template>
                      

## 🔀 Version Control (Git)

- Tracks code changes and history
- Enables collaboration across teams
- Supports branching, merging, pull requests

### 🛠 Tools
- Git CLI
- GitHub / GitLab / Bitbucket

✅ Apart from other benefits this Helps traceability and experimentation


                  </script></section><section data-markdown><script type=text/template>
                      

## 🧱 Coding Standards

### Why?
A runtime error can happen in development, testing, staging, or production. Coding standards helps.

- 🧹 **Enforces coding standards** : Maintains consistent style across the team / codebase
- 🐞 **Catches potential bugs early** : Detects unused variables, unreachable code, etc. 
- 🔐 **Improves security** : Flags insecure patterns or APIs
- 🧠 **Improves readability/maintainablity** : Enforces spacing, naming, formatting 
- 🧪 **Supports testability** : Encourages smaller, cleaner functions
- ⚙️ **Integrates with CI/CD** : Prevents bad code from merging automatically
- **Eliminates build time errors**.


                  </script></section><section data-markdown><script type=text/template>
                      

### 🛠 Tools
- Linters (ESLint (javascript), Flake8/pylint (python), go (golint))
- Formatters (Prettier (javascript), Black (python))

📌 Team-wide style guide (e.g., Google, Airbnb)


                  </script></section><section data-markdown><script type=text/template>
                      

## 🔍 Code Reviews

- Detect bugs before they go live
- Share knowledge within the team
- Improve code quality & team culture

### 🛠 Tools
- GitHub Pull Requests
- Review tools: Gerrit, Bitbucket, Coderabbit, Github copilot, prompting (Cursor, Windsurf)

✅ Always review: logic, readability, and test coverage


                  </script></section><section data-markdown><script type=text/template>
                      

## 🧪 Test-Driven Development (TDD)

> "Write the test before the code."

### Benefits
- Better software design
- Built-in documentation
- Prevents regression
- Help in changing code with less stress

### Cycle
1. **Red** – Write a failing test
2. **Green** – Write just enough code to pass
3. **Refactor** – Clean and improve

🛠 Tools: JUnit, PyTest, Jest, Mocha


                  </script></section><section data-markdown><script type=text/template>

## 🔍 Static Code Analysis

- Analyzes code without running it
- Detects bugs, vulnerabilities, code smells

### 🛠 Tools
- SonarQube / SonarCloud
- CodeQL (GitHub)
- ESLint, StyleCop

✅ Improves security and maintainability


                  </script></section><section data-markdown><script type=text/template>
                      

## 🚀 Continuous Integration (CI)

- Automate build + test for every commit
- Fast feedback loop
- Prevents integration hell

### 🛠 Tools
- GitHub Actions
- GitLab CI/CD
- Jenkins, CircleCI

✅ “Fail fast, fix faster”


                  </script></section><section data-markdown><script type=text/template>
                      

## 🚢 Continuous Delivery / Deployment (CD)

- Delivery: Always ready to release
- Deployment: Actually pushed to users

### Benefits
- Fast feedback from users
- Low-risk incremental changes

🛠 Deploy tools: ArgoCD, Spinnaker, AWS CodeDeploy


                  </script></section><section data-markdown><script type=text/template>
                      

## 🤝 DevOps Culture

- **Development + Operations = DevOps**
- Shared responsibility for delivery
- Automate everything
- Monitor everything

### 🛠 Toolchain
- Infra: Terraform, Ansible
- Observability: Prometheus, Grafana, Datadog
- Communication: Slack, Teams

✅ Speed + Stability = Competitive Advantage


                  </script></section><section data-markdown><script type=text/template>
                      

## 🔄 Agile Practices

- Work in small, iterative cycles
- Regular feedback from stakeholders
- Continuous improvement
- Continuous code refactoring

### 🛠 Tools
- Jira, Azure DevOps
- Trello, Asana

✅ Deliver value incrementally, not just software


                  </script></section><section data-markdown><script type=text/template>
