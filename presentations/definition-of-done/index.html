## Definition of Done (DoD): What and Why?

- Ensures **shared understanding** of completeness
- Provides **quality control**
- Prevents incomplete or ambiguous deliverables
- Exists at **multiple levels**:  
  ✅ **User Story**  
  ✅ **Sprint**  
  ✅ **Release**


                  </script></section><section data-markdown><script type=text/template>
                      

## DoD for a **User Story**

- All acceptance criteria met
- Code written and peer-reviewed
- Unit and integration tests passing
- Functional on development/test environments
- Documentation (if applicable) updated
- PO has reviewed and accepted

✅ Goal: User story is Ready for **potential release**


                  </script></section><section data-markdown><script type=text/template>
                      

## DoD for a **Sprint**

- All committed stories meet **story-level DoD**
- System is integrated — no broken builds
- Code is deployed to **staging/test** environment
- No major open defects
- Sprint Goal is achieved
- Internal demo has been done

✅ Goal: Ready for **stakeholder demo and feedback**


                  </script></section><section data-markdown><script type=text/template>
                      

## DoD for a **Release**

- All stories and sprints included are "done"
- Full regression testing is completed
- Performance benchmarks are met
- Security & compliance checks passed
- Documentation complete (user, admin, support)
- Legal, UX, and product approvals in place
- Deployment plan is created and verified

✅ Goal: Ready for **production deployment**


                  </script></section><section data-markdown><script type=text/template>
                      

## Summary: DoD Levels at a Glance

<table>
  <tr>
    <th>Level</th>
    <th>Focus</th>
    <th>Owned By</th>
  </tr>
  <tr>
    <td>User Story</td>
    <td>Feature completeness & functionality</td>
    <td>Dev Team + PO</td>
  </tr>
  <tr>
    <td>Sprint</td>
    <td>Integration & team completeness</td>
    <td>Scrum Team</td>
  </tr>
  <tr>
    <td>Release</td>
    <td>System readiness for production</td>
    <td>Team + Stakeholders</td>
  </tr>
</table>

                  </script></section><section data-markdown><script type=text/template>
                      

## Why Multiple DoDs?

- Different layers require different **standards of completeness**
- Helps manage **quality**, **risk**, and **expectations**
- Supports **continuous delivery** and **agile governance**

"Done" means more than just "coded."


                  </script></section><section data-markdown><script type=text/template>
                      

## Thank You 🙏  
Define "Done" clearly — and ship with confidence.
